<!DOCTYPE html>
<html lang="en">

<head>
    <script src="scripts.js"></script>
    <script type="text/javascript">
        function init() {
            time_switch();
        }
        window.onload = init;
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCRhubarb</title>
    <link href="k.css" rel="stylesheet">
    <link href="images/head/icon.png" rel="icon">
</head>

<body>
    <div class="top" id="top_id">
        <div class="logo">
            <center><img src="" alt="Website's logo" id="logo_img" width="498" title="that's the logo :o"></center>
        </div>
    </div>
    <h1>
        <div class="box_blue">
            <span>BOX 1</span>
        </div>
        <div class="box_red">
            <span>BOX 2</span>
        </div>
        <div class="box_orange">
            <span>BOX 3</span>
        </div>
        <div class="box_green">
            <span>BOX 4</span>
        </div>
        <div class="box_white">
            <span>BOX 5</span>
        </div>
        <div class="row">
            <button class="buttons_style" tabindex="-1" onclick='smb()'><img src="../images/bg/smb.png"
                    tilte="Super Mario Bros. (Super Mario All-Stars) design"></button>
            <button class="buttons_style" tabindex="-1" onclick='smb3()'><img src="../images/bg/smb3.png"
                    tilte="Super Mario Bros. 3 (Super Mario All-Stars) design"></button>
            <button class="buttons_style" tabindex="-1" onclick='smw()'><img src="../images/bg/smw.png"
                    tilte="Super Mario World design"></button>
        </div><br><span id="bg_time">Background time:</span>
        <select name="time" id="time_select" onchange="time_set()">
            <option value="day" id="day">Day</option>
            <option value="night" id="night">Night</option>
        </select>
        <span id="moving_clouds">Moving clouds</span><input type="checkbox" id="clouds_moving_button" onclick="cloud_button();">
    </h1>
    <div class="footer_content">
        <footer id="footer_bg">
        </footer>
    </div>
</body>
<div class="hills" id="hills_bg"></div>
<div class="sun"></div>
<div class="clouds" id="clouds_bg"></div>
<script>
    language();
    ui_start();
    check_dim();
    clouds_shift();
    set_clouds();
</script>

</html>
