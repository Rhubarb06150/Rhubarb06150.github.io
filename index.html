<!DOCTYPE html>
<html lang="en">

<head>
    <script src="scripts.js"></script>
    <script type="text/javascript">
        function init() {
            ui_start();
            load_acc_index();
            check_dim();
            time_switch();
        }
        window.onload = init;
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCRhubarb</title>
    <link href="k.css" rel="stylesheet">
    <link href="images/head/icon.png" rel="icon">
</head>

<body>
    <div class="top" id="top_id">
        <div class="logo">
            <center><img src="" alt="Website's logo" id="logo_img" width="498" title="that's the logo :o"></center>
        </div>
    </div>
    <div class="box_blue">
        <div class="columns">

                <span id="useful_links">Useful links</span>

        <footer id="footer_bg">
        </footer>
