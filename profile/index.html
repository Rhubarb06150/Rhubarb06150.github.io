<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../scripts.js"></script>
    <script type="text/javascript">
        function init() {
            ui_start();
            load_acc();
        }
        window.onload = init;
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile editing</title>
    <link href="../k.css" rel="stylesheet">
    <link href="../images/head/icon.png" rel="icon">
</head>

<body>
    <div class="top" id="top_id">
        <div class="logo">
            <center><a href="https://mcrhubarb.net/"><img src="" alt="Website's logo" id="logo_img" width="498"
                        title="that's the logo :o"></a></center>
        </div>
    </div>
    <center>
        <div class="box_orange">
            <div class="columns">
                <h1>
                    <span id="profile_settings">Profile settings</span><br><br>
                    <span id="usrname_input">Username: </span><input type="text" id="username" required minlength="3"
                        maxlength="25" size="20" placeholder="3 letters min. username"><br>
                    <div class="username_not_enough_long" id="username_alert"><br><span id="acc_error">Username empty or
                            not long enough</span>
                    </div><br>
                    <span id="pfp_span">Profile picture: </span><input type="file" id="pfp" name="pfp"
                        accept="image/png, image/jpeg" onchange="readURL(this)" /><br><br>
                    <div class="pfp"><img src="" height="64px" width="64px" id="pfp_pr"></div>
                    <br>
                    <button onclick="upload_acc()" id="modify">Modify profile</button>
                    <div class="preferences_uploaded" id="pref_up">
                        <br>
                        <div><span id="acc_modify_succes">Profile was successfully modified!</span></div>
                        <br>
                        <div><a href="https://mcrhubarb.net/"><span id="back_to_main">Go back to main page</span></a>
                        </div>
                    </div>

                    <br><br><span id="website_style">Website style:</span>
                    <br><br>
                    <div class="columns">
                        <div class="row">
                            <button class="buttons_style" tabindex="-1" onclick='smb()'><img src="../images/bg/smb.png"
                                    title="Super Mario Bros. (Super Mario All-Stars) design"></button>
                            <button class="buttons_style" tabindex="-1" onclick='smb3()'><img
                                    src="../images/bg/smb3.png"
                                    title="Super Mario Bros. 3 (Super Mario All-Stars) design"></button>
                            <button class="buttons_style" tabindex="-1" onclick='smw()'><img src="../images/bg/smw.png"
                                    title="Super Mario World design"></button>
                        </div><br><span id="background">Background:</span><br>
                        <div class="row">
                            <button class="buttons_style" id="bg1b_" tabindex="-1" onclick='bg1()'><img src="../images/bg/smb.png"
                                    title="" id="bg1b" width="32px"></button>
                            <button class="buttons_style" id="bg2b_" tabindex="-1" onclick='bg2()'><img src="../images/bg/smb3.png"
                                    title="" id="bg2b" width="32px"></button>
                            <button class="buttons_style" id="bg3b_" tabindex="-1" onclick='bg3()'><img src="../images/bg/smw.png"
                                    title="" id="bg3b" width="32px"></button><br>
                            <br><span id="bg_time">Background time:</span>
                            <select name="time" id="time_select" onchange="time_set()">
                                <option value="day" id="day">Day</option>
                                <option value="night" id="night">Night</option>
                            </select>   
                            <br><br>
                            <span id="moving_clouds">Moving clouds: </span><input type="checkbox"
                                id="clouds_moving_button" onclick="cloud_button();">
                        </div>
                </h1>
            </div>
        </div>
    </center>
    <div class="footer_content">
        <footer id="footer_bg">
        </footer>
    </div>
</body>
<div class="hills" id="top_layer_bg"></div>
<div class="sun"></div>
<div class="clouds" id="clouds_bg"></div>
<script>
    language();
    check_dim();
    clouds_shift();
    set_clouds();
    bg_buttons();
    bg_check();
</script>

</html>
