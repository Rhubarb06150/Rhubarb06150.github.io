<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../scripts.js"></script>
    <script type="text/javascript">
        function init() {
            ui_start();
            load_acc();
            time_switch();
            check_dim();
        }
        window.onload = init;
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile editing</title>
    <link href="../k.css" rel="stylesheet">
    <link href="../images/head/icon.png" rel="icon">
</head>

<body>
    <div class="top" id="top_id">
        <div class="logo">
            <center><a href="https://mcrhubarb.net/"><img src="" alt="Website's logo" id="logo_img" width="498"
                        title="that's the logo :o"></a></center>
        </div>
    </div>
    <center>
        <div class="box_blue">
            <div class="columns">
                <h1>Profile settings<br><br>Username: <input type="text" id="username" required minlength="3"
                        maxlength="25" size="20" placeholder="3 letters min. username"><br>
                    <div class="username_not_enough_long" id="username_alert"><br>Username empty or not long enough
                    </div><br>
                    Profile picture: <input type="file" id="pfp" name="pfp" accept="image/png, image/jpeg"
                        onchange="readURL(this)" /><br><br>
                    <div class="pfp"><img src="" height="64px" width="64px" id="pfp_pr"></div>
                    <br>
                    <button onclick="upload_acc()">Modify profile</button>
                    <div class="preferences_uploaded" id="pref_up">
                        <br>
                        <div>Profile was successfully modified!</div>
                        <br>
                        <div><a href="https://mcrhubarb.net/">Go back to main page</a></div>
                    </div>

                    <br><br>Website style:
                <br><br>
                <div class="row">
                    <button class="buttons_style" tabindex="-1" onclick='smb()'><img src="../images/bg/smb.png"
                            tilte="Super Mario Bros. (Super Mario All-Stars) design"></button>
                    <button class="buttons_style" tabindex="-1" onclick='smb3()'><img src="../images/bg/smb3.png"
                            tilte="Super Mario Bros. 3 (Super Mario All-Stars) design"></button>
                    <button class="buttons_style" tabindex="-1" onclick='smw()'><img src="../images/bg/smw.png"
                            tilte="Super Mario World design"></button>
                </div><br>Background time:
                <select name="time" id="time_select" onchange="time_set()">
                    <option value="day">Day</option>
                    <option value="night">Night</option>
                </select>
            </h1>
            </div>
        </div>
    </center>
    <div class="footer_content">
        <footer id="footer_bg">
        </footer>
    </div>
</body>
<div class="hills" id="hills_bg"></div>
<div class="sun"></div>
<div class="clouds" id="clouds_bg"></div>

</html>
