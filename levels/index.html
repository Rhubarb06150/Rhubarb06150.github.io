<!DOCTYPE html>
<html lang="en">

<head>
    <script src="/scripts.js"></script>
    <script type="text/javascript">
        function init() {
            LoadLevel();
            load_acc_index();
            check_dim();
            var bg = localStorage.getItem('bg')
            var ui = localStorage.getItem('ui')
            if ((bg != 3) && (ui == ('smb3' || 'smb'))) {
                time_switch();
            }
            ui_start();
        }
        window.onload = init;
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The page where you can upload your SMBX levels">
    <title>Levels - MCRhubarb</title>
    <link href="/k.css" rel="stylesheet">
    <link href="/images/head/icon.png" rel="icon">
</head>

<body>
    <div class="top" id="top_id">
        <div class="logo">
            <center><a href="/"><img src="" alt="Website's logo" id="logo_img" width="498"
                        title="that's the logo :o"></a>
            </center>
        </div>
    </div>

    <center id="start">
        <div id="search_bar" class="search_bar">
            <div class="search_bar_top">
                <div class="option">
                    <a href="/lvlupload/">
                        <img src="/images/obj/upload.png" width="16" height="16">
                        <span class="infos_lvl_upload" id="lvl_up_button">Upload a level</span>
                    </a>
                </div>
                <div>
                    <a href="/levels/"><span class="infos_lvl_upload">Go to levels main page</span></a>
                </div>
                <div class="search_bars">
                    <div>
                        <form onsubmit="return false;" id="search_name_form">
                            <div class="option">
                                <img src="/images/obj/wen.png" width="16" height="16">
                                <span class="infos_lvl_upload" id="search_span">Search level by name</span>
                                <input type="text" placeholder="Level name" class="entry" id="level_name_entry" size="15">
                            </div>
                            <input type="submit" hidden />
                        </form>
                    </div>
                    <div>
                        <form onsubmit="return false;" id="search_id_form">
                            <div class="option">
                                <img src="/images/obj/wen.png" width="16" height="16">
                                <span class="infos_lvl_upload" id="search_span">Go to level by ID</span>
                                <input type="text" placeholder="Level ID" class="entry" id="level_id_entry" size="4">
                            </div>
                            <input type="submit" hidden />
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div id="wlg" class="wlg"></div>
        <div id="wlvlsgo" class="wlvlsgo"></div>
        <div id="commentaries"></div>
        <script>
            var form1 = document.getElementById("search_name_form");
            var form2 = document.getElementById("search_id_form");

            function searchLevelByName() {
                let url = removeParamFromURL(window.location.href, 'lvlid');
                url = removeParamFromURL(url, 'search');
                url += '?search=' + document.getElementById("level_name_entry").value;
                window.location = url;
            };
            function goToLevelByID() {
                let url = removeParamFromURL(window.location.href, 'lvlid');
                url = removeParamFromURL(url, 'search');
                url += '?lvlid=' + document.getElementById("level_id_entry").value;
                window.location = url;
            };

            form1.addEventListener('submit', searchLevelByName);
            form2.addEventListener('submit', goToLevelByID);
        </script>
    </center>
    <div class="footer_content">
        <footer id="footer_bg">
        </footer>
    </div>

</body>
<div class="hills" id="top_layer_bg"></div>
<div class="sun"></div>
<div class="clouds" id="clouds_bg"></div>
<script>
    clouds_shift();
    set_clouds();
    time_switch();
    verifySearch();
</script>

</html>
