<!DOCTYPE html>
<html lang="en">

<head>
    <script src="/scripts.js"></script>
    <script type="text/javascript">
        function init() {
            LoadLevel();
            load_acc_index();
            check_dim();
            var bg = localStorage.getItem('bg')
            var ui = localStorage.getItem('ui')
            if ((bg != 3) && (ui == ('smb3' || 'smb'))) {
                time_switch();
            }
            ui_start();
        }
        window.onload = init;
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The page where you can upload your SMBX levels">
    <title>Levels - MCRhubarb</title>
    <link href="/k.css" rel="stylesheet">
    <link href="/images/head/icon.png" rel="icon">
</head>

<body>
    <div class="top" id="top_id">
        <div class="logo">
            <center><a href="/"><img src="" alt="Website's logo" id="logo_img" width="498"
                        title="that's the logo :o"></a>
            </center>
        </div>
    </div>
    <center id="start">
        <div id="search_bar" class="search_bar">
            <div class="space_between">
                <div class="option">
                    <a href="/lvlupload/">
                        <img src="/images/obj/upload.png" width="16" height="16">
                        <span class="infos_lvl_upload" id="lvl_up_button">Upload a level</span>
                    </a>
                </div>
                <form onsubmit="searchLevel(document.getElementById('level_entry').value)">
                    <div class="option">
                        <img src="/images/obj/wen.png" width="16" height="16">
                        <span class="infos_lvl_upload" id="search_span">Search for a level</span>
                        <input type="text" placeholder="Level name or ID" class="entry" id="level_entry">
                    </div>
                    <input type="submit" hidden />
                </form>
            </div>
        </div>
        <div id="wlg" class="wlg"></div>
        <div id="wlvlsgo" class="wlvlsgo"></div>
        <div id="commentaries"></div>
    </center>
    <div class="footer_content">
        <footer id="footer_bg">
        </footer>
    </div>

</body>
<div class="hills" id="top_layer_bg"></div>
<div class="sun"></div>
<div class="clouds" id="clouds_bg"></div>
<script>
    clouds_shift();
    set_clouds();
    time_switch();
</script>

</html>
